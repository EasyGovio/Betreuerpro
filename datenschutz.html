  var currentLang = "de";

  function detectLanguage() {
    var l = navigator.language || navigator.userLanguage || "de";
    if (l.indexOf("tr") === 0) return "tr";
    if (l.indexOf("en") === 0) return "en";
    return "de";
  }

  function renderPrivacy(lang) {
    var t = privacyTexts[lang];
    if (!t) return;
    var html = '<div class="privacy-title">' + t.title + '</div>' +
               '<div class="privacy-sub">' + t.sub + '</div>';
    t.sections.forEach(function(s) {
      html += '<div class="privacy-section"><h3>' + s.title + '</h3><p>' + s.text + '</p></div>';
    });
    document.getElementById("privacyContent").innerHTML = html;
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
    document.getElementById("headerTagline").innerText = lang === "tr" ? "Gizlilik" : lang === "en" ? "Privacy" : "Datenschutz";
  }

  function setLanguage(lang) { currentLang = lang; renderPrivacy(lang); }

  currentLang = detectLanguage();
  renderPrivacy(currentLang);

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { setLanguage(this.getAttribute('data-lang')); });
  });
</script>
