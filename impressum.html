    .impressum-sub { font-size: 0.9rem; color: #C9D4E6; margin-bottom: 32px; border-left: 3px solid #F0D080; padding-left: 16px; }

    .impressum-section p { font-size: 0.9rem; color: #C9D4E6; line-height: 1.8; }
    .footer { padding: 24px 24px 32px; border-top: 1px solid #1E3A5F; text-align: center; font-size: 0.7rem; color: #8BA0BC; }
    .footer a { color: #F0D080; text-decoration: none; margin: 0 8px; }
    .ecosystem { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 12px; }

  };

  var currentLang = "de";

  function detectLanguage() {
    var l = navigator.language || navigator.userLanguage || "de";
    if (l.indexOf("tr") === 0) return "tr";
    if (l.indexOf("en") === 0) return "en";
    return "de";
  }

  function renderImpressum(lang) {
    var t = impressumTexts[lang];
    if (!t) return;
    var html = '<div class="impressum-title">' + t.title + '</div>' +
               '<div class="impressum-sub">' + t.sub + '</div>';
    t.sections.forEach(function(s) {
      html += '<div class="impressum-section"><h3>' + s.title + '</h3><p>' + s.text + '</p></div>';
    });
    document.getElementById("impressumContent").innerHTML = html;
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
    document.getElementById("headerTagline").innerText = lang === "tr" ? "Künye" : lang === "en" ? "Legal Notice" : "Impressum";
  }

  function setLanguage(lang) { currentLang = lang; renderImpressum(lang); }

  currentLang = detectLanguage();
  renderImpressum(currentLang);

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { setLanguage(this.getAttribute('data-lang')); });
  });
</script>
</body>
