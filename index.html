  var currentLang = "de";

  function detectLanguage() {
    var l = navigator.language || navigator.userLanguage || "de";
    if (l.indexOf("tr") === 0) return "tr";
    if (l.indexOf("en") === 0) return "en";
    return "de";
  }

  function renderContent(lang) {
    var t = translations[lang];
    if (!t) return;
    document.getElementById("headerTagline").innerText = t.headerTag;

    var featuresHtml = t.features.map(function(f) {
      return '<div class="feature-card"><div class="feature-icon">' + f.icon + '</div><div class="feature-title">' + f.title + '</div><div class="feature-desc">' + f.desc + '</div></div>';
    }).join('');

    var statsHtml = t.stats.map(function(s) {
      return '<div class="stat-card"><div class="stat-number">' + s.num + '</div><div class="stat-label">' + s.label + '</div></div>';
    }).join('');

    var blogHtml = '<div class="blog-section">' +
      '<div class="blog-title">📘 ' + t.blogTitle + '</div>' +
      '<div class="blog-sub">' + t.blogSub + '</div>' +
      '<div class="blog-grid">';
    t.articles.forEach(function(article) {
      blogHtml += '<div class="blog-card">' +
        '<h4>' + article.title + '</h4>' +
        '<p>' + article.desc + '</p>' +
        '<a href="' + article.link + '" class="blog-link">' + (lang === 'de' ? 'Mehr erfahren →' : (lang === 'tr' ? 'Daha fazla →' : 'Read more →')) + '</a>' +
        '</div>';
    });
    blogHtml += '</div></div>';

    var roleOptionsHtml = t.roleOptions.map(function(r) {
      return '<option value="' + r + '">' + r + '</option>';
    }).join('');

    document.getElementById("mainContent").innerHTML =
      '<div class="hero">' +
        '<div class="badge">' + t.badge + '</div>' +
        '<h1>' + t.h1 + '</h1>' +
        '<div class="hero-sub">' + t.sub + '</div>' +
      '</div>' +
      '<div class="features">' + featuresHtml + '</div>' +
      '<div class="stats">' + statsHtml + '</div>' +
      blogHtml +
      '<div class="waitlist">' +
        '<h3>📬 ' + t.waitlistTitle + '</h3>' +
        '<p>' + t.waitlistDesc + '</p>' +
        '<form id="waitlistForm">' +
          '<div class="form-group"><input type="text" name="name" id="fullname" placeholder="' + t.namePlace + '" required></div>' +
          '<div class="form-group"><input type="email" name="email" id="email" placeholder="' + t.emailPlace + '" required></div>' +
          '<div class="form-group"><select name="role" id="role" required>' + roleOptionsHtml + '</select></div>' +
          '<input type="hidden" name="source" value="betreuerpro.io">' +
          '<button type="submit" class="btn-primary" id="submitBtn">' + t.btnText + '</button>' +
          '<div class="form-note">' + t.note + '</div>' +
          '<div id="formMessage"></div>' +
        '</form>' +
      '</div>';

    document.getElementById("waitlistForm").addEventListener("submit", function(e) {
      e.preventDefault();
      submitWaitlist();
    });

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
  }

  async function submitWaitlist() {
    var t = translations[currentLang];
    var btn = document.getElementById('submitBtn');
    var messageDiv = document.getElementById('formMessage');
    btn.textContent = t.sending;
    btn.disabled = true;
    try {
      var res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        body: new FormData(document.getElementById('waitlistForm')),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        messageDiv.innerHTML = '<div class="form-success">✓ ' + t.successMsg + '</div>';
        document.getElementById('waitlistForm').reset();
      } else {
        messageDiv.innerHTML = '<div class="form-error">⚠ ' + t.errorMsg + '</div>';
        btn.textContent = translations[currentLang].btnText;
        btn.disabled = false;
      }
    } catch(err) {
      messageDiv.innerHTML = '<div class="form-error">⚠ Verbindungsfehler / Bağlantı hatası</div>';
      btn.disabled = false;
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    renderContent(lang);
  }

  currentLang = detectLanguage();
  renderContent(currentLang);

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setLanguage(this.getAttribute('data-lang'));
    });
  });
</script>
